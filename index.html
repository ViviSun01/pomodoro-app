<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>一盏灯</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Adamina&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-frame" id="appFrame" data-theme="light" data-lamp="off">
    <!-- Status bar -->
    <div class="status-bar" id="statusBar"></div>

    <!-- Lamp Container -->
    <div class="lamp-container" id="lampContainer">
      <!-- Light effect behind lamp (only visible when on) -->
      <div class="lamp-glow" id="lampGlow"></div>

      <!-- Lamp shade (Union) -->
      <img class="lamp-shade" id="lampShade" alt="lamp">

      <!-- Lamp base/light (only visible when on) -->
      <img class="lamp-base" id="lampBase" alt="lamp base">
      <img class="lamp-light" id="lampLight" alt="lamp light">

      <!-- Lamp dot -->
      <img class="lamp-dot" id="lampDot" alt="dot">
    </div>

    <!-- Timer Display -->
    <div class="timer-display" id="timerDisplay">00:00</div>

    <!-- Turn On Button -->
    <div class="turn-on-btn" id="turnOnBtn">
      <span class="turn-on-text" id="turnOnText">Turn On</span>
    </div>

    <!-- Settings Button -->
    <div class="settings-btn" id="settingsBtn">
      <img src="https://www.figma.com/api/mcp/asset/63d91c79-64f2-4b18-ac94-003b3442a33b" alt="settings">
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="settings-modal" id="settingsModal">
    <div class="settings-content">
      <h2 class="settings-title">Settings</h2>

      <div class="settings-section">
        <div class="settings-label">Focus Duration</div>
        <div class="settings-item">
          <span class="settings-item-text">Minutes</span>
          <input type="number" class="duration-input" id="durationInput" value="25" min="1" max="120">
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-label">Theme</div>
        <div class="settings-item">
          <span class="settings-item-text">Appearance</span>
          <div class="theme-toggle">
            <button class="theme-btn active" data-theme="light">Light</button>
            <button class="theme-btn" data-theme="dark">Dark</button>
          </div>
        </div>
      </div>

      <button class="close-btn" id="closeSettingsBtn">Done</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="renderer.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
